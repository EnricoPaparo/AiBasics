<svg viewBox="0 0 160 44" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon background -->
  <rect x="0" y="2" width="40" height="40" rx="7" fill="#07090d"/>
  <rect x="0" y="2" width="40" height="40" rx="7" fill="none" stroke="#00ff41" stroke-width="0.6" opacity="0.35"/>

  <!-- M circuit traces -->
  <g filter="url(#glow)" stroke="#00ff41" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="8,36 8,8 20,24 32,8 32,36"/>
  </g>

  <!-- Nodes -->
  <g filter="url(#glow)" fill="#00ff41">
    <circle cx="8"  cy="8"  r="2.8"/>
    <circle cx="32" cy="8"  r="2.8"/>
    <circle cx="20" cy="24" r="2.8"/>
    <circle cx="8"  cy="36" r="2.8"/>
    <circle cx="32" cy="36" r="2.8"/>
  </g>

  <!-- MACHINA wordmark -->
  <text
    x="50" y="29"
    font-family="'Share Tech Mono', 'Courier New', monospace"
    font-size="20"
    font-weight="400"
    letter-spacing="3"
    fill="#eaf4ff"
  >MACHINA</text>
</svg>
