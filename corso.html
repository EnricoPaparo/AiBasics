<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MACHINA — Corso</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="assets/style.css">
  <script>
    // Applica il tema salvato prima del render per evitare il flash
    (function () {
      try {
        var t = localStorage.getItem('machina-theme');
        if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
      } catch (e) {}
    })();
  </script>
</head>
<body>

<div class="grid-bg"></div>

<!-- ══ LAYOUT ═════════════════════════════════════════════════ -->
<div class="course-layout">

  <!-- ── HEADER ──────────────────────────────────────────────── -->
  <header class="site-header">
    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Apri menu"><span></span><span></span><span></span></button>

    <a href="index.html" class="header-logo">
      <img src="assets/logo.svg" alt="MACHINA" class="header-logo-img">
    </a>

    <div class="header-divider"></div>

    <div class="header-breadcrumb" id="breadcrumb">
      <span>Seleziona una lezione</span>
    </div>

    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Cambia tema chiaro/scuro" title="Cambia tema">☀</button>
    <a href="index.html" class="header-home-btn">← Home</a>
  </header>

  <!-- ── SIDEBAR ─────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">// LEZIONI</div>
    </div>

    <div id="sidebar-chapters"></div>
  </aside>

  <!-- Mobile overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- ── CONTENT ─────────────────────────────────────────────── -->
  <main class="content-area" id="content-area">
    <!-- Populated by app.js -->
  </main>

</div>

<!-- Footer legale minimo -->
<footer style="text-align:center;padding:1.5rem;font-family:'Share Tech Mono',monospace;font-size:.68rem;color:var(--text-dim);border-top:1px solid var(--border);background:var(--bg2)">
  © 2026 Enrico Paparo — Tutti i diritti riservati ·
  <a href="legal.html" style="color:var(--text-dim);text-decoration:underline">Note Legali &amp; Privacy</a>
</footer>

<!-- marked.js for markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<!-- highlight.js per la colorazione della sintassi del codice -->
<script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/highlight.min.js"></script>
<script>
  // Configure marked
  if (typeof marked !== 'undefined') {
    marked.setOptions({
      breaks: true,
      gfm: true,
    });
  }
</script>

<!-- Embedded manifest (no fetch needed) -->
<script src="lessons/manifest.js"></script>

<!-- Embedded lesson content (all .md files pre-bundled) -->
<script src="lessons/content.js"></script>

<!-- Application logic -->
<script src="assets/app.js"></script>

</body>
</html>
