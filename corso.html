<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">

  <title>Corso — AI Agent Factory</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div class="grid-bg"></div>

<!-- ══ LAYOUT ═════════════════════════════════════════════════ -->
<div class="course-layout">

  <!-- ── HEADER ──────────────────────────────────────────────── -->

    <a href="index.html" class="header-logo">⬡ AI<span>·</span>AGENT<span>·</span>FACTORY</a>

      <div class="sidebar-title">// LEZIONI</div>

<!-- marked.js for markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script>
  // Configure marked
  if (typeof marked !== 'undefined') {
    marked.setOptions({
      breaks: true,
      gfm: true,
    });
  }
</script>

<!-- Embedded manifest (no fetch needed) -->
